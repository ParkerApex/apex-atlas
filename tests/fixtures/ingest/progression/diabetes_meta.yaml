module: diabetes
version: 1.1.0
source:
  name: KDIGO 2024 / USRDS 2023 / UKPDS 64 (CKD); Yau 2012 / UKPDS-50 (DR)
  provenance: sourced
  url: https://kdigo.org/guidelines/ckd-evaluation-and-management/
  note: >
    Two diabetes complications are sourced here. CKD (eGFR <60
    mL/min/1.73 m² or persistent macroalbuminuria) at 10 years: 20%,
    inside the UKPDS 64 envelope and KDIGO 2024 20-30% range; USRDS
    2023 ADR confirms diabetes as the #1 cause of incident ESRD.
    Retinopathy at 10 years: 30%, representing clinically-noted DR
    rather than screening-detected sub-clinical findings; Yau 2012
    meta-analysis pooled DR prevalence at 34.6% and UKPDS-50 (Stratton
    2001) reports cumulative DR incidence ~50% at 10 yr in T2DM.
  citations:

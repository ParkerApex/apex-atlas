        Adler AI, Stevens RJ, Manley SE, Bilous RW, Cull CA, Holman RR;
        UKPDS Group. Development and progression of nephropathy in type 2
        diabetes: The United Kingdom Prospective Diabetes Study (UKPDS 64).
        Kidney International. 2003;63(1):225-232.
      url: https://doi.org/10.1046/j.1523-1755.2003.00712.x
      version: Kidney International Vol 63 Issue 1
      accessed: '2026-04-25'
      table: 'Table 2: Annual transition rates and cumulative incidence by diabetic nephropathy stage, n=5,097 newly-diagnosed T2DM.'
    - source: >
        US Renal Data System. 2023 USRDS Annual Data Report: Epidemiology
        of kidney disease in the United States. National Institutes of
        Health, National Institute of Diabetes and Digestive and Kidney
        Diseases.
      url: https://usrds-adr.niddk.nih.gov/2023
      version: 2023 ADR
      accessed: '2026-04-25'
      table: 'Volume 2 Chapter 1: Incidence, Prevalence, Patient Characteristics, and Treatment Modalities — primary cause of incident ESRD.'
    - source: >
        Stevens PE, Ahmed SB, Carrero JJ, Foster B, et al. KDIGO 2024
        Clinical Practice Guideline for the Evaluation and Management of
        Chronic Kidney Disease. Kidney International 2024;105(4S):S117-S314.
      url: https://kdigo.org/guidelines/ckd-evaluation-and-management/

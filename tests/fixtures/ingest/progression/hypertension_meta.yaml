module: hypertension
version: 1.0.0
source:
  name: KDIGO 2024 CKD Guideline + USRDS 2023 ADR (Hsu 2005 / Fox 2004 anchored)
  provenance: sourced
  url: https://kdigo.org/guidelines/ckd-evaluation-and-management/
  note: >
    Cumulative incidence of CKD (eGFR <60 mL/min/1.73 m²) at 10 years
    among patients with hypertension. Aggregated across the foundational
    cohort studies cited and the KDIGO 2024 CKD Guideline narrative
    range. The KDIGO guideline recommends serum creatinine + UACR
    measurement at HTN diagnosis and follow-up; the 10.5% rate is the
    midpoint of the 10-12% range Hsu and Fox report and lies inside the
    10-20% KDIGO range for Stage 1+ HTN.
  citations:
    - source: >
        Hsu CY, McCulloch CE, Darbinian J, Go AS, Iribarren C. Elevated
        blood pressure and risk of end-stage renal disease in subjects
        without baseline kidney disease. Archives of Internal Medicine.
        2005;165(8):923-928.
      url: https://jamanetwork.com/journals/jamainternalmedicine/fullarticle/486521
      version: ARCH INTERN MED, VOL 165, APR 25, 2005
      accessed: '2026-04-25'
      table: 'Tables 2-3: Hazard ratios for ESRD by JNC-7 BP category in 316,675 KPNC adults followed mean 12.0 yr.'
      note: >
        Hsu reports HRs for ESRD (the terminal endpoint), not CKD broadly;
        Stage 1 HTN HR 1.87 and Stage 2 HTN HR 3.65 vs optimal BP. The
        cumulative incidence used here is from the same cohort's CKD
        endpoint (Hsu CY et al, J Am Soc Nephrol 2009 follow-up paper).
    - source: >
        Fox CS, Larson MG, Leip EP, Culleton B, Wilson PW, Levy D.
        Predictors of new-onset kidney disease in a community-based
        population. JAMA. 2004;291(7):844-850.
      url: https://jamanetwork.com/journals/jama/fullarticle/198251
      version: JAMA Vol 291 No 7
      accessed: '2026-04-25'
      table: 'Table 3: 18-yr cumulative incidence of CKD by baseline characteristics, Framingham Offspring (n~2,800).'
    - source: >
        Stevens PE, Ahmed SB, Carrero JJ, Foster B, et al. KDIGO 2024
        Clinical Practice Guideline for the Evaluation and Management of
        Chronic Kidney Disease. Kidney International 2024;105(4S):S117-S314.
      url: https://kdigo.org/guidelines/ckd-evaluation-and-management/
      version: KDIGO 2024
      accessed: '2026-04-25'
      table: 'Recommendation 1.1.1 + Section 4.1 narrative on HTN as a major CKD risk factor.'

table: practitioners.csv
purpose: |
  Synthetic clinician roster used to populate Practitioner + PractitionerRole
  resources (both patient-encounter care teams and the Da Vinci Plan-Net
  provider directory) and Encounter.participant references. Names are
  fictitious; NPI numbers are dummy values within the 1xxxxxxxxx individual-NPI
  block, each terminated with a valid Luhn check digit computed per the CMS
  NPPES algorithm (prefix "80840", mod-10). The facility_npi column links each
  clinician to their primary facility (an organization NPI in locations.csv),
  so the same NPIs appear in claims and in the published provider directory.
sources:
  - name: NUCC Health Care Provider Taxonomy Code Set
    url: https://www.nucc.org/index.php/code-sets-mainmenu-41/provider-taxonomy-mainmenu-40
    notes: |
      taxonomy_code/taxonomy_display columns are codes from the NUCC
      taxonomy. The encounter_class column maps a clinician to the v3
      ActCode encounter class they typically staff (AMB = ambulatory,
      EMER = emergency, IMP = inpatient) so the generator can sample
      a plausible attending for each encounter.
  - name: CMS NPPES NPI numbering scheme
    url: https://www.cms.gov/Regulations-and-Guidance/Administrative-Simplification/NationalProvIdentStand
    notes: |
      Individual practitioner NPIs start with 1, organization NPIs with
      2. The 10th digit is a Luhn check over the 9-digit identifier
      prefixed with "80840" (ISO 7812 issuer prefix). All NPIs in this
      file pass that check.
notes: |
  Roster covers 150 clinicians across 34 specialties at 10 facilities — sized to
  the 20,000-patient connectathon population at roughly one clinician per 130
  patients, primary-care-weighted with a full specialist complement. The first
  40 rows are hand-curated, named anchors; the remainder are generated
  deterministically by scripts/expand_provider_roster.py (valid NPPES NPIs,
  distinct names, apportioned across specialties). It is a realistic-shaped
  roster for downstream tests, provider-directory publishing, and demos, NOT a
  statistically calibrated distribution of US clinicians.

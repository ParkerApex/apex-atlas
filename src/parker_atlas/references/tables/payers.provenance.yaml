  note: |
    Curated synthetic payer roster covering the four primary US payer types
    surfaced by `payer_mix`:
      - medicare (Medicare FFS, CMS)
      - medicare-advantage (synthetic MA plan)
      - medicaid (state Medicaid placeholder)
      - commercial (4 synthetic commercial plans sampled by intra-type weight)

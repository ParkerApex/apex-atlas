  url: https://www2.census.gov/programs-surveys/popest/tables/2020-2024/national/asrh/
  note: 'Weights computed from `NC-EST2024-SYASEXN.xlsx` — Annual Estimates

    of the Resident Population by Single Year of Age and Sex for the

    United States: April 1, 2020 to July 1, 2024 (Vintage 2024).

    The July 1, 2024 column was aggregated into the NHANES-compatible

    age brackets (0-17, 18-39, 40-59, 60+) separately for males and

    females, then divided by total US population to yield the joint

    proportion in each (age, sex) cell. Brackets sum to 1.00000.

    '

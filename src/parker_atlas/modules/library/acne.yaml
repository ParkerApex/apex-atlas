module: acne
version: 0.1.0
description: >
  Acne vulgaris module for adolescent and young-adult dermatology workflows.
cites:
  - source: American Academy of Dermatology acne guideline
    url: https://www.aad.org/member/clinical-quality/guidelines/acne
    summary: Acne care includes topical retinoids, benzoyl peroxide, and selective antibiotic therapy.
conditions:

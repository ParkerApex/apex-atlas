        spec_id: acne_dermatology_visit
        when: today
        encounter_class: AMB
        type: {system: http://snomed.info/sct, code: "390906007", display: Follow-up encounter}
        reason: {system: http://snomed.info/sct, code: "11381005", display: Acne vulgaris}
      - resource_type: MedicationRequest
        spec_id: acne_adapalene
        when: today
        link_to: acne_dermatology_visit
        probability: 0.55
        medication: {system: http://www.nlm.nih.gov/research/umls/rxnorm, code: "602", display: Adapalene}
        reason: {system: http://snomed.info/sct, code: "11381005", display: Acne vulgaris}

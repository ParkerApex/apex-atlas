module: atopic_dermatitis
version: 0.1.0
description: >
  Atopic dermatitis module for common dermatology and pediatric primary
  care coverage. Prevalence is highest in children, with persistent or
  adult disease in a smaller adult population. The module emits an
  ambulatory visit and topical anti-inflammatory therapy.
cites:
  - source: >
      Silverberg JI, Hanifin JM. Adult eczema prevalence and associations
      with asthma and other health and demographic factors. J Allergy Clin
      Immunol. 2013.
    url: https://pubmed.ncbi.nlm.nih.gov/23664230/
    summary: >
      US survey analysis describing adult eczema prevalence and common
      allergic comorbidity patterns.
  - source: American Academy of Dermatology atopic dermatitis guidelines
    url: https://www.aad.org/member/clinical-quality/guidelines/atopic-dermatitis
    summary: >
      Guideline-based care includes moisturizers, topical corticosteroids,
      topical calcineurin inhibitors, and escalation for refractory disease.

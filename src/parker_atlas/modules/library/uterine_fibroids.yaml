module: uterine_fibroids
version: 0.1.0
description: >
  Uterine fibroids module for women's health, anemia, imaging, and procedure-planning workflows.
cites:
  - source: ACOG uterine fibroids patient FAQ
    url: https://www.acog.org/womens-health/faqs/uterine-fibroids
    summary: Uterine fibroids are common benign tumors that may cause bleeding, pain, and reproductive symptoms.
conditions:
  - id: uterine_fibroids
    code: {system: http://snomed.info/sct, code: "95315005", display: Uterine leiomyoma}
    prevalence:
      female:
        "0-17": 0.002
        "18-39": 0.090
        "40-59": 0.260
        "60-99": 0.060
      male:
        "0-17": 0.000
        "18-39": 0.000
        "40-59": 0.000
        "60-99": 0.000
    onset_age: {min: 18, max: 60}
    emits:
      - resource_type: Encounter
        spec_id: fibroids_gynecology_visit
        when: today
        encounter_class: AMB
        type: {system: http://snomed.info/sct, code: "390906007", display: Follow-up encounter}
        reason: {system: http://snomed.info/sct, code: "95315005", display: Uterine leiomyoma}
      - resource_type: Procedure
        spec_id: fibroids_pelvic_ultrasound
        when: today
        link_to: fibroids_gynecology_visit
        probability: 0.60
        code: {system: http://snomed.info/sct, code: "16310003", display: Ultrasonography}
        reason: {system: http://snomed.info/sct, code: "95315005", display: Uterine leiomyoma}

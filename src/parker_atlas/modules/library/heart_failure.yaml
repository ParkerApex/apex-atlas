module: heart_failure
version: 0.3.0
description: >
  Heart failure (HF) prevalence by sex-and-age bracket. Probability-
  module flavor — each (sex, age) cell maps to a Bernoulli rate.

  v0.2 adds a one-hop progression to cardiorenal syndrome (kidney
  dysfunction secondary to heart failure): among patients with chronic
  HF, ~25% develop clinically-relevant CKD within 10 years (anchored
  to Damman et al, J Am Coll Cardiol 2014 and KDIGO 2024 narrative on
  cardiorenal interactions). When the progression fires, the patient
  receives a cardiorenal-syndrome Condition plus a nephrology
  follow-up Encounter and an eGFR Observation.

  Prevalence rates are sourced from the AHA Heart Disease and Stroke
  Statistics — 2024 Update (Tsao et al, Circulation 2024). HF affects
  ~6.7M US adults (~2.5% prevalence overall, sharply age-stratified
  with ~10% prevalence in adults 65+). Atlas's demographic age_sex.csv
  samples uniformly across ages 60-99 within the bracket, so the
  60-99 target is the average of AHA's 60-79 and 80+ subbuckets:
  women (5.5% + 14.5%)/2 = 10%, men (7.7% + 12.8%)/2 = 10%.

  When a patient is positive, the module emits:
  - A cardiology follow-up Encounter
  - An NT-proBNP Observation (LOINC 33762-6) in the 400-2000 pg/mL
    range, the broad zone for diagnosed HF (cutoffs: <300 normal,
    >900 likely HF for adults 50-75; the synthetic range covers most
    confirmed cases)
  - A metoprolol succinate MedicationRequest in 70% of cases — beta-
    blockers are first-line guideline-directed medical therapy (GDMT)
    for HFrEF per the 2022 AHA/ACC/HFSA guideline (the exact cohort
    rate is a future ingestion)

  Pediatric HF (cardiomyopathy, congenital heart disease) is not in
  scope; the 0-17 bracket is set to 0.
cites:
  - source: >
      Tsao CW, Aday AW, Almarzooq ZI, et al. Heart Disease and Stroke
      Statistics — 2024 Update: A Report from the American Heart
      Association. Circulation 2024;149(8):e347-e913.
    url: https://www.ahajournals.org/doi/10.1161/CIR.0000000000001209
    summary: >
      US adults heart failure prevalence (NHANES 2017-2020): ~6.7M
      adults; ~2.5% overall. Age × sex breakdown: 20-39 ~0.5%;
      40-59 men 2.0% / women 1.5%; 60-79 men 7.7% / women 5.5%;
      80+ men 12.8% / women 14.5%.
  - source: >
      Heidenreich PA, Bozkurt B, Aguilar D, et al. 2022 AHA/ACC/HFSA
      Guideline for the Management of Heart Failure. Journal of the
      American College of Cardiology 2022;79(17):e263-e421.
    url: https://www.jacc.org/doi/10.1016/j.jacc.2021.12.012
    summary: >
      Beta-blockers (carvedilol, metoprolol succinate, bisoprolol) are
      Class I (Level A) guideline-directed therapy for HFrEF.
conditions:
  - id: heart_failure
    code:
      system: http://snomed.info/sct
      code: "84114007"
      display: Heart failure (disorder)
    prevalence:
      female:
        "0-17": 0.0
        "18-39": 0.005
        "40-59": 0.015
        "60-99": 0.100
      male:
        "0-17": 0.0
        "18-39": 0.005
        "40-59": 0.020
        "60-99": 0.100
    onset_age:
      min: 55
      max: 80
    # One-hop intra-module progression: among chronic HF patients,
    # ~25% develop clinically-relevant CKD within 10 yr. Damman 2014
    # JACC meta-analysis pooled CKD prevalence ~32% in HF cohorts;
    # KDIGO 2024 narrative on cardiorenal interactions confirms HF
    # as an independent driver of incident CKD.
    progressions:
      - to: cardiorenal_syndrome
        after_years: 10
        probability: 0.25
    emits:
      - resource_type: Encounter
        spec_id: hf_cardiology_visit
        when: today
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "390906007"
          display: Follow-up encounter
        reason:
          system: http://snomed.info/sct
          code: "84114007"
          display: Heart failure

      - resource_type: Observation
        spec_id: hf_nt_probnp
        when: today
        link_to: hf_cardiology_visit
        category: laboratory
        code:
          system: http://loinc.org
          code: "33762-6"
          display: NT-proBNP
        value_range: {low: 400, high: 2000, precision: 0}
        unit: pg/mL
        unit_code: pg/mL

      - resource_type: MedicationRequest
        spec_id: hf_metoprolol
        when: today
        link_to: hf_cardiology_visit
        probability: 0.70
        medication:
          system: http://www.nlm.nih.gov/research/umls/rxnorm
          code: "866412"
          display: Metoprolol Succinate 25 MG Extended Release Oral Tablet
        reason:
          system: http://snomed.info/sct
          code: "84114007"
          display: Heart failure

      # Echocardiogram — gold-standard imaging for HF assessment of
      # ejection fraction, chamber sizes, and valve function. The 2022
      # AHA/ACC/HFSA guideline marks transthoracic echo as Class I
      # (Level C-LD) at HF diagnosis and serial follow-up.
      - resource_type: Procedure
        spec_id: hf_echocardiogram
        when: today
        link_to: hf_cardiology_visit
        probability: 0.85
        code:
          system: http://snomed.info/sct
          code: "40701008"
          display: Echocardiography (procedure)
        reason:
          system: http://snomed.info/sct
          code: "84114007"
          display: Heart failure

  # Progression target — only entered via `progressions` from
  # heart_failure. prevalence is 0 across all brackets so the standard
  # probability gate cannot fire it.
  - id: cardiorenal_syndrome
    code:
      system: http://snomed.info/sct
      code: "707577004"
      display: Cardiorenal syndrome (disorder)
    prevalence:
      "0-99": 0.0
    emits:
      # Nephrology follow-up Encounter at the cardiorenal onset date.
      - resource_type: Encounter
        spec_id: cardiorenal_nephro_visit
        when: onset
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "390906007"
          display: Follow-up encounter
        reason:
          system: http://snomed.info/sct
          code: "707577004"
          display: Cardiorenal syndrome

      # eGFR Observation in the CKD-stage range (eGFR 30-59 covers
      # stages 3a-3b, the most common presentation of cardiorenal
      # CKD per Damman 2014).
      - resource_type: Observation
        spec_id: cardiorenal_egfr
        when: onset
        link_to: cardiorenal_nephro_visit
        category: laboratory
        code:
          system: http://loinc.org
          code: "33914-3"
          display: Glomerular filtration rate/1.73 sq M.predicted (MDRD)
        value_range: {low: 30, high: 59, precision: 0}
        unit: mL/min/{1.73_m2}
        unit_code: mL/min/{1.73_m2}

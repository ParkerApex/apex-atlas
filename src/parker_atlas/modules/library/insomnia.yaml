module: insomnia
version: 0.1.0
description: >
  Insomnia module for behavioral health, primary-care, and medication safety workflows.
cites:
  - source: American Academy of Sleep Medicine insomnia guideline
    url: https://aasm.org/clinical-resources/practice-standards/practice-guidelines/
    summary: Chronic insomnia care includes cognitive behavioral therapy and selective pharmacologic treatment.
conditions:

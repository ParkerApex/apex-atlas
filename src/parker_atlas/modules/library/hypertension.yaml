module: hypertension
version: 0.5.0
description: >
  Essential hypertension module. Probability-module flavor: each
  (age, sex) cell maps to a Bernoulli rate that decides whether the
  patient is hypertensive.

  When a patient is positive, the module now emits a small encounter-
  level record in addition to the Condition:
  - An ambulatory follow-up Encounter
  - A blood-pressure Observation with systolic 140-180 / diastolic
    90-110 (the range by which NHANES defines stage-2 hypertension),
    linked to the Encounter
  - A MedicationRequest for lisinopril in 60% of cases (approximating
    the NHANES treated-hypertension rate for diagnosed adults; the
    exact rate is a future ingestion)

  Adult (18+) prevalence rates are sourced from NCHS Data Brief 511
  (NHANES August 2021 – August 2023), Table 1. The pediatric (0-17)
  bracket is a placeholder — NHANES does not survey minors for
  hypertension on this cascade.

  The bundled fidelity expectation uses the same NHANES numbers, so
  `atlas validate --cohort --module hypertension` at sufficient cohort
  size checks pipeline correctness (module matches its own declared
  rates). Emit probabilities and value ranges are placeholders and
  are not yet gated by the harness — a future commit will add emit-
  fidelity metrics (e.g., "≥95% of hypertensive patients should have a
  BP Observation in the 140/90 range").
cites:
  - source: NCHS Data Brief 511 (Muntner et al., NHANES Aug 2021–Aug 2023)
    url: https://www.cdc.gov/nchs/products/databriefs/db511.htm
    summary: >
      US adults aged 18+ hypertension prevalence (crude): 23.4% at
      18-39, 52.5% at 40-59, 71.6% at 60+ (both sexes). Sex breakdown:
      men 30.0/55.9/72.7%, women 16.4/49.0/70.6%.
conditions:
  - id: essential_hypertension
    code:
      system: http://snomed.info/sct
      code: "59621000"
      display: Essential hypertension (disorder)
    prevalence:
      female:
        "0-17": 0.04
        "18-39": 0.164
        "40-59": 0.490
        "60-99": 0.706
      male:
        "0-17": 0.04
        "18-39": 0.300
        "40-59": 0.559
        "60-99": 0.727
    # Per NHANES Brief 511 cumulative-incidence figures, most adult-onset
    # hypertension is diagnosed between the early 30s and mid-60s.
    # Patients younger than 25 who fire positive (rare; mostly the 0-17
    # placeholder bracket) are treated as just diagnosed.
    onset_age:
      min: 25
      max: 65
    emits:
      # The Encounter is the diagnosis visit, anchored at onset_date.
      - resource_type: Encounter
        spec_id: htn_diagnosis_visit
        when: onset
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "185349003"
          display: Encounter for check up
        reason:
          system: http://snomed.info/sct
          code: "59621000"
          display: Essential hypertension

      # The BP measurement that established the diagnosis — at onset.
      # Linked to the diagnosis Encounter because they share `when`.
      - resource_type: Observation
        spec_id: htn_bp_reading
        when: onset
        category: vital-signs
        code:
          system: http://loinc.org
          code: "85354-9"
          display: Blood pressure panel with all children optional
        components:
          - code:
              system: http://loinc.org
              code: "8480-6"
              display: Systolic blood pressure
            value_range:
              low: 140
              high: 180
              precision: 0
            unit: mm[Hg]
          - code:
              system: http://loinc.org
              code: "8462-4"
              display: Diastolic blood pressure
            value_range:
              low: 90
              high: 110
              precision: 0
            unit: mm[Hg]

      # Initial prescription written at the diagnosis visit. Same `when`,
      # so it links to the Encounter.
      - resource_type: MedicationRequest
        spec_id: htn_ace_inhibitor
        when: onset
        probability: 0.60
        medication:
          system: http://www.nlm.nih.gov/research/umls/rxnorm
          code: "197361"
          display: Lisinopril 10 MG Oral Tablet
        reason:
          system: http://snomed.info/sct
          code: "59621000"
          display: Essential hypertension

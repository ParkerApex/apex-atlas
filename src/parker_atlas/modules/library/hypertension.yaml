module: hypertension
version: 0.8.0
description: >
  Essential hypertension module. Probability-module flavor: each
  (age, sex) cell maps to a Bernoulli rate that decides whether the
  patient is hypertensive.

  v0.8 introduces a sourced progressions overlay. The inline
  `progressions:` block on essential_hypertension is now superseded at
  load time by `hypertension.progressions.yaml`, which carries
  KDIGO 2024 / USRDS 2023 / Hsu 2005 / Fox 2004 citations and is
  produced by `atlas ingest progression`. The inline rate remains as
  a fallback when the overlay is absent.

  When a patient is positive, the module now emits a small encounter-
  level record in addition to the Condition:
  - An ambulatory follow-up Encounter
  - A blood-pressure Observation with systolic 140-180 / diastolic
    90-110 (the range by which NHANES defines stage-2 hypertension),
    linked to the Encounter
  - A MedicationRequest for lisinopril in 60% of cases (approximating
    the NHANES treated-hypertension rate for diagnosed adults; the
    exact rate is a future ingestion)

  v0.7 adds a one-hop progression to hypertensive chronic kidney
  disease. After 10 years of HTN, ~10% of patients progress to CKD
  (placeholder rate; see cites). When progression fires, the patient
  receives a Condition for hypertensive CKD plus a follow-up
  nephrology Encounter and an eGFR Observation.

  Adult (18+) prevalence rates are sourced from NCHS Data Brief 511
  (NHANES August 2021 – August 2023), Table 1. The pediatric (0-17)
  bracket is a placeholder — NHANES does not survey minors for
  hypertension on this cascade.

  The bundled fidelity expectation uses the same NHANES numbers, so
  `atlas validate --cohort --module hypertension` at sufficient cohort
  size checks pipeline correctness (module matches its own declared
  rates). Emit probabilities and value ranges are placeholders and
  are not yet gated by the harness — a future commit will add emit-
  fidelity metrics (e.g., "≥95% of hypertensive patients should have a
  BP Observation in the 140/90 range").
cites:
  - source: NCHS Data Brief 511 (Muntner et al., NHANES Aug 2021–Aug 2023)
    url: https://www.cdc.gov/nchs/products/databriefs/db511.htm
    summary: >
      US adults aged 18+ hypertension prevalence (crude): 23.4% at
      18-39, 52.5% at 40-59, 71.6% at 60+ (both sexes). Sex breakdown:
      men 30.0/55.9/72.7%, women 16.4/49.0/70.6%.
  - source: >
      Fox CS, Larson MG, Leip EP, Culleton B, Wilson PW, Levy D.
      Predictors of new-onset kidney disease in a community-based
      population. JAMA. 2004;291(7):844-850.
    url: https://jamanetwork.com/journals/jama/fullarticle/198251
    summary: >
      Framingham Offspring cohort (~2,800 adults, ~18 yr follow-up).
      Hypertension was an independent predictor of incident CKD
      (eGFR<59). Cumulative CKD incidence among hypertensives
      approximated 10-13% over the follow-up window. The progression
      rate used here (10% at 10 yr) is a placeholder anchored to this
      and KDIGO ranges; clean ingestion via `atlas ingest progression`
      is a future commit.
conditions:
  - id: essential_hypertension
    code:
      system: http://snomed.info/sct
      code: "59621000"
      display: Essential hypertension (disorder)
    prevalence:
      female:
        "0-17": 0.04
        "18-39": 0.164
        "40-59": 0.490
        "60-99": 0.706
      male:
        "0-17": 0.04
        "18-39": 0.300
        "40-59": 0.559
        "60-99": 0.727
    # Per NHANES Brief 511 cumulative-incidence figures, most adult-onset
    # hypertension is diagnosed between the early 30s and mid-60s.
    # Patients younger than 25 who fire positive (rare; mostly the 0-17
    # placeholder bracket) are treated as just diagnosed.
    onset_age:
      min: 25
      max: 65
    # One-hop progression to hypertensive CKD. The bundled
    # `hypertension.progressions.yaml` overlay supersedes this rate at
    # load time with the sourced 10.5% (KDIGO 2024 / USRDS 2023 / Hsu
    # 2005 / Fox 2004); this inline block is the fallback when the
    # overlay is absent.
    progressions:
      - to: hypertensive_ckd
        after_years: 10
        probability: 0.10
    emits:
      # === Diagnosis day ===
      - resource_type: Encounter
        spec_id: htn_diagnosis_visit
        when: onset
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "185349003"
          display: Encounter for check up
        reason:
          system: http://snomed.info/sct
          code: "59621000"
          display: Essential hypertension

      # The BP measurement that established the diagnosis.
      - resource_type: Observation
        spec_id: htn_initial_bp
        when: onset
        link_to: htn_diagnosis_visit
        category: vital-signs
        code:
          system: http://loinc.org
          code: "85354-9"
          display: Blood pressure panel with all children optional
        components:
          - code:
              system: http://loinc.org
              code: "8480-6"
              display: Systolic blood pressure
            value_range: {low: 140, high: 180, precision: 0}
            unit: mm[Hg]
          - code:
              system: http://loinc.org
              code: "8462-4"
              display: Diastolic blood pressure
            value_range: {low: 90, high: 110, precision: 0}
            unit: mm[Hg]

      # Initial prescription written at the diagnosis visit.
      - resource_type: MedicationRequest
        spec_id: htn_ace_inhibitor
        when: onset
        link_to: htn_diagnosis_visit
        probability: 0.60
        medication:
          system: http://www.nlm.nih.gov/research/umls/rxnorm
          code: "197361"
          display: Lisinopril 10 MG Oral Tablet
        reason:
          system: http://snomed.info/sct
          code: "59621000"
          display: Essential hypertension

      # === Follow-up visit today ===
      - resource_type: Encounter
        spec_id: htn_followup_visit
        when: today
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "390906007"
          display: Follow-up encounter
        reason:
          system: http://snomed.info/sct
          code: "59621000"
          display: Essential hypertension

      # Recent BP — typically lower than the diagnostic reading because
      # most patients are on treatment by now. Range covers controlled
      # to mildly elevated.
      - resource_type: Observation
        spec_id: htn_recent_bp
        when: today
        link_to: htn_followup_visit
        category: vital-signs
        code:
          system: http://loinc.org
          code: "85354-9"
          display: Blood pressure panel with all children optional
        components:
          - code:
              system: http://loinc.org
              code: "8480-6"
              display: Systolic blood pressure
            value_range: {low: 120, high: 145, precision: 0}
            unit: mm[Hg]
          - code:
              system: http://loinc.org
              code: "8462-4"
              display: Diastolic blood pressure
            value_range: {low: 75, high: 92, precision: 0}
            unit: mm[Hg]

  # Progression target — only entered via `progressions` from
  # essential_hypertension, never directly. prevalence is 0 across all
  # brackets so the standard probability gate cannot fire it.
  - id: hypertensive_ckd
    code:
      system: http://snomed.info/sct
      code: "709044004"
      display: Chronic kidney disease due to hypertension (disorder)
    prevalence:
      "0-99": 0.0
    emits:
      # Nephrology follow-up encounter at the time of progression.
      - resource_type: Encounter
        spec_id: htn_ckd_nephro_visit
        when: onset
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "390906007"
          display: Follow-up encounter
        reason:
          system: http://snomed.info/sct
          code: "709044004"
          display: Chronic kidney disease due to hypertension

      # eGFR Observation in the CKD-stage range (eGFR 30-59 covers
      # stages 3a-3b, the most common presentation at progression).
      - resource_type: Observation
        spec_id: htn_ckd_egfr
        when: onset
        link_to: htn_ckd_nephro_visit
        category: laboratory
        code:
          system: http://loinc.org
          code: "33914-3"
          display: Glomerular filtration rate/1.73 sq M.predicted (MDRD)
        value_range: {low: 30, high: 59, precision: 0}
        unit: mL/min/{1.73_m2}
        unit_code: mL/min/{1.73_m2}

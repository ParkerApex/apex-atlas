module: diabetes
version: 0.4.0
description: >
  Total diabetes prevalence (both diagnosed and undiagnosed, types 1
  and 2 combined) by age bracket. Probability-module flavor — each
  age bracket maps to a Bernoulli rate.

  When a patient is positive, the module emits an encounter-level
  record:
  - An ambulatory follow-up Encounter
  - A Hemoglobin A1c Observation with value 6.5–10.0% (diagnostic
    threshold through moderately-uncontrolled range), linked to the
    Encounter
  - A MedicationRequest for metformin 500 mg in 70% of cases
    (approximating the rate of diagnosed diabetics on metformin per
    ADA guidance; exact rate is a future ingestion)

  Adult (20+) prevalence rates are sourced from NCHS Data Brief 516
  (NHANES August 2021 – August 2023), Table 2. The 0-19 bracket is a
  placeholder: NHANES does not publish diabetes prevalence for minors
  in this brief. A refinement using pediatric SEARCH data or separate
  NHANES pediatric tables is future work.

  The module assigns the SNOMED parent code 73211009 (Diabetes mellitus)
  rather than a type-specific code. Per the CDC National Diabetes
  Statistics Report, roughly 95% of diabetes cases are type 2, so
  almost all Atlas-generated diabetes patients correspond to T2DM in
  practice. A future module revision can split by type when
  age-stratified T1-vs-T2 prevalence is ingested.

  Emit value ranges and medication probability are placeholders with
  clinical-literature ranges; the cohort harness currently checks
  only condition prevalence. Emit-fidelity checks (A1C distribution,
  metformin treatment rate) land in a follow-up commit.
cites:
  - source: NCHS Data Brief 516 (Gwira et al., NHANES Aug 2021–Aug 2023)
    url: https://www.cdc.gov/nchs/products/databriefs/db516.htm
    summary: >
      US adults aged 20+ total diabetes prevalence (crude): 3.6% at
      20-39, 17.7% at 40-59, 27.3% at 60+. Sex breakdown overall:
      men 18.0%, women 13.7%. Diabetes defined as measured A1C ≥6.5%
      or self-reported diagnosis. ~95% of cases are type 2 per the
      CDC National Diabetes Statistics Report.
conditions:
  - id: diabetes_mellitus
    code:
      system: http://snomed.info/sct
      code: "73211009"
      display: Diabetes mellitus (disorder)
    prevalence:
      "0-19": 0.003
      "20-39": 0.036
      "40-59": 0.177
      "60-99": 0.273
    # Type 2 diabetes (the dominant case at ~95% of US diabetics per the
    # CDC National Diabetes Statistics Report) typically presents in mid
    # adulthood. Pediatric T1 onsets are handled implicitly: patients
    # younger than 35 fall into the "just diagnosed today" branch.
    onset_age:
      min: 35
      max: 70
    emits:
      # === Diagnosis day ===
      - resource_type: Encounter
        spec_id: diabetes_diagnosis_visit
        when: onset
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "185349003"
          display: Encounter for check up
        reason:
          system: http://snomed.info/sct
          code: "73211009"
          display: Diabetes mellitus

      # Initial A1C that established the diagnosis. Range reflects newly-
      # diagnosed values before treatment kicks in (typically high).
      - resource_type: Observation
        spec_id: diabetes_initial_a1c
        when: onset
        link_to: diabetes_diagnosis_visit
        category: laboratory
        code:
          system: http://loinc.org
          code: "4548-4"
          display: Hemoglobin A1c/Hemoglobin.total in Blood
        value_range:
          low: 7.5
          high: 11.0
          precision: 1
        unit: "%"

      # Initial metformin prescription written at diagnosis.
      - resource_type: MedicationRequest
        spec_id: diabetes_metformin
        when: onset
        link_to: diabetes_diagnosis_visit
        probability: 0.70
        medication:
          system: http://www.nlm.nih.gov/research/umls/rxnorm
          code: "860975"
          display: Metformin 500 MG Oral Tablet
        reason:
          system: http://snomed.info/sct
          code: "73211009"
          display: Diabetes mellitus

      # === 90-day post-diagnosis follow-up ===
      # ADA guidance: re-check A1C ~3 months after starting therapy.
      # The follow-up A1C range is somewhat lower than the initial one,
      # reflecting partial response to metformin and lifestyle changes.
      - resource_type: Observation
        spec_id: diabetes_90day_a1c
        when: onset+90d
        category: laboratory
        code:
          system: http://loinc.org
          code: "4548-4"
          display: Hemoglobin A1c/Hemoglobin.total in Blood
        value_range:
          low: 6.5
          high: 9.0
          precision: 1
        unit: "%"

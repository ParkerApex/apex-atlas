module: benign_prostatic_hyperplasia
version: 0.1.0
description: >
  Benign prostatic hyperplasia module for common older-male urology
  care. It emits urology follow-up, PSA testing, and alpha-blocker therapy.
cites:
  - source: American Urological Association BPH guideline
    url: https://www.auanet.org/guidelines-and-quality/guidelines/benign-prostatic-hyperplasia-(bph)-guideline
    summary: >
      BPH prevalence increases with age and is managed with symptom
      assessment, medication, and procedural options when indicated.
conditions:
  - id: benign_prostatic_hyperplasia
    code: {system: http://snomed.info/sct, code: "266569009", display: Benign prostatic hyperplasia}
    prevalence:
      female:
        "0-99": 0.0
      male:
        "0-17": 0.0
        "18-39": 0.010
        "40-59": 0.180
        "60-99": 0.520
    onset_age: {min: 40, max: 90}
    emits:
      - resource_type: Encounter
        spec_id: bph_urology_visit
        when: today
        encounter_class: AMB
        type: {system: http://snomed.info/sct, code: "390906007", display: Follow-up encounter}
        reason: {system: http://snomed.info/sct, code: "266569009", display: Benign prostatic hyperplasia}
      - resource_type: Observation
        spec_id: bph_psa
        when: today
        link_to: bph_urology_visit
        probability: 0.55
        category: laboratory
        code: {system: http://loinc.org, code: "2857-1", display: "Prostate specific Ag [Mass/volume] in Serum or Plasma"}
        value_range: {low: 0.5, high: 6.0, precision: 1}
        unit: ng/mL
        unit_code: ng/mL
      - resource_type: MedicationRequest
        spec_id: bph_tamsulosin
        when: today
        link_to: bph_urology_visit
        probability: 0.55
        medication: {system: http://www.nlm.nih.gov/research/umls/rxnorm, code: "77492", display: Tamsulosin}
        reason: {system: http://snomed.info/sct, code: "266569009", display: Benign prostatic hyperplasia}

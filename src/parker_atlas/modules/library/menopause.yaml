module: menopause
version: 0.1.0
description: >
  Menopause module for midlife women's health, symptom management, and preventive-care cohorts.
cites:
  - source: North American Menopause Society position statements
    url: https://www.menopause.org/publications/clinical-practice-materials
    summary: Menopause care includes symptom assessment, risk review, and individualized therapy.
conditions:
  - id: menopause
    code: {system: http://snomed.info/sct, code: "289903006", display: Menopause present}
    prevalence:
      female:
        "0-17": 0.000
        "18-39": 0.010
        "40-59": 0.300
        "60-99": 0.850
      male:
        "0-17": 0.000
        "18-39": 0.000
        "40-59": 0.000
        "60-99": 0.000
    onset_age: {min: 40, max: 60}
    emits:
      - resource_type: Encounter
        spec_id: menopause_primary_care_visit
        when: today
        encounter_class: AMB
        type: {system: http://snomed.info/sct, code: "390906007", display: Follow-up encounter}
        reason: {system: http://snomed.info/sct, code: "289903006", display: Menopause present}
      - resource_type: Observation
        spec_id: menopause_symptom_score
        when: today
        link_to: menopause_primary_care_visit
        probability: 0.45
        category: vital-signs
        code: {system: http://loinc.org, code: "89261-2", display: Menopause symptoms score}
        value_range: {low: 4, high: 18, precision: 0}
        unit: score
        unit_code: "{score}"

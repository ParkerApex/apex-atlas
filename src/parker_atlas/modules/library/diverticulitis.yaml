        spec_id: diverticulitis_acute_visit
        when: onset
        encounter_class: AMB
        type: {system: http://snomed.info/sct, code: "185345009", display: Encounter for symptom}
        reason: {system: http://snomed.info/sct, code: "307496006", display: Diverticulitis}
      - resource_type: MedicationRequest
        spec_id: diverticulitis_amoxicillin_clavulanate
        when: onset
        link_to: diverticulitis_acute_visit
        probability: 0.45
        medication: {system: http://www.nlm.nih.gov/research/umls/rxnorm, code: "562508", display: Amoxicillin 875 MG / Clavulanate 125 MG Oral Tablet}
        reason: {system: http://snomed.info/sct, code: "307496006", display: Diverticulitis}

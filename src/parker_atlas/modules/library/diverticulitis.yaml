module: diverticulitis
version: 0.1.0
description: >
  Diverticulitis module for acute abdominal-pain and GI follow-up workflows.
cites:
  - source: American Gastroenterological Association clinical practice update on diverticulitis
    url: https://www.gastrojournal.org/article/S0016-5085(20)35512-8/fulltext
    summary: Diverticulitis care includes diagnosis, selective antibiotics, and follow-up colon evaluation when indicated.
conditions:

    code:
      system: http://snomed.info/sct
      code: "363346000"
      display: Malignant neoplasm of colon (disorder)
    prevalence:
      female:
        "0-17":  0.0
        "18-44": 0.001
        "45-64": 0.005
        "65-99": 0.014
      male:
        "0-17":  0.0
        "18-44": 0.001
        "45-64": 0.007
        "65-99": 0.018
    onset_age:
      min: 40
      max: 90
    mortality:
      after_years: 5
      probability: 0.25
      cause:
        system: http://snomed.info/sct
        code: "363346000"
        display: Malignant neoplasm of colon
    emits:
      - resource_type: Encounter
        spec_id: crc_oncology_visit
        when: today
        encounter_class: AMB
        type:
          system: http://snomed.info/sct
          code: "390906005"
          display: Follow-up encounter (procedure)
        reason:
          system: http://snomed.info/sct
          code: "363346000"
          display: Malignant neoplasm of colon

      # Colonoscopy — diagnostic and surveillance standard
      - resource_type: Procedure
        spec_id: crc_colonoscopy
        when: onset
        link_to: crc_oncology_visit
        probability: 0.80
        code:
          system: http://snomed.info/sct
          code: "73761001"
          display: Colonoscopy (procedure)
        reason:
          system: http://snomed.info/sct
          code: "363346000"
          display: Malignant neoplasm of colon

      # CT abdomen/pelvis — standard staging imaging (NCCN mandated at diagnosis)
      - resource_type: Procedure
        spec_id: crc_ct_abdomen
        when: onset
        link_to: crc_oncology_visit
        probability: 0.70
        code:
          system: http://snomed.info/sct
          code: "77477000"
          display: Computerized axial tomography of abdomen (procedure)
        reason:
          system: http://snomed.info/sct
          code: "363346000"
          display: Malignant neoplasm of colon

      # CEA tumor marker — elevated in ~60-80% of metastatic CRC (normal <5 ng/mL)
      - resource_type: Observation
        spec_id: crc_cea
        when: today
        link_to: crc_oncology_visit
        category: laboratory
        code:
          system: http://loinc.org
          code: "2039-6"
          display: Carcinoembryonic Ag [Mass/volume] in Serum or Plasma
        value_range: {low: 5.0, high: 150.0, precision: 1}
        unit: ng/mL
        unit_code: ng/mL

      # Capecitabine — oral fluoropyrimidine; adjuvant or XELOX regimen (NCCN Cat 1)
      - resource_type: MedicationRequest
        spec_id: crc_capecitabine
        when: today
        link_to: crc_oncology_visit
        probability: 0.30
        medication:
          system: http://www.nlm.nih.gov/research/umls/rxnorm
          code: "213277"
          display: Capecitabine 500 MG Oral Tablet
        reason:
          system: http://snomed.info/sct
          code: "363346000"
          display: Malignant neoplasm of colon

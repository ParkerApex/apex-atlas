module: sepsis_survivorship
version: 0.1.0
source:
  name: CDC sepsis clinical information
  provenance: sourced
  url: https://www.cdc.gov/sepsis/hcp/clinical-overview/index.html
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance. Sepsis survivors may need follow-up for recovery,
    function, and complications after hospitalization.
  citations:
  - source: CDC sepsis clinical information
    url: https://www.cdc.gov/sepsis/hcp/clinical-overview/index.html
    accessed: '2026-06-04'
metrics:
- id: history_of_sepsis_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '161511000'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.003
    18-39: 0.006
    40-59: 0.018
    60-99: 0.055

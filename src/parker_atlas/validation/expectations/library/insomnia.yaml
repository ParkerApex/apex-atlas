module: insomnia
version: 0.1.0
source:
  name: American Academy of Sleep Medicine insomnia guideline
  provenance: sourced
  url: https://aasm.org/clinical-resources/practice-standards/practice-guidelines/
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. Chronic insomnia
    care includes cognitive behavioral therapy and selective pharmacologic treatment.
  citations:
  - source: American Academy of Sleep Medicine insomnia guideline
    url: https://aasm.org/clinical-resources/practice-standards/practice-guidelines/
    accessed: '2026-06-04'
metrics:
- id: insomnia_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '193462001'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.03
    18-39: 0.12
    40-59: 0.15
    60-99: 0.18

module: fall_risk
version: 0.1.0
source:
  name: CDC STEADI older adult fall prevention
  provenance: sourced
  url: https://www.cdc.gov/steadi/index.html
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance. CDC STEADI supports screening, assessment,
    and intervention for older adults at risk for falls.
  citations:
  - source: CDC STEADI older adult fall prevention
    url: https://www.cdc.gov/steadi/index.html
    accessed: '2026-06-04'
metrics:
- id: risk_for_falls_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '129839007'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.002
    18-39: 0.006
    40-59: 0.02
    60-99: 0.18

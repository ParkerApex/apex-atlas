module: hyperthyroidism
version: 0.1.0
source:
  name: NHANES thyroid disease analysis and ATA hyperthyroidism guideline
  provenance: sourced
  url: https://academic.oup.com/jcem/article/87/2/489/2846790
  note: >
    Targets mirror the module's female-skewed hyperthyroidism approximation and
    representative endocrine monitoring emits.
  citations:
    - source: Hollowell JG et al. NHANES III thyroid disease analysis
      url: https://academic.oup.com/jcem/article/87/2/489/2846790
      accessed: "2026-05-22"
    - source: 2016 American Thyroid Association Hyperthyroidism Guideline
      url: https://www.liebertpub.com/doi/10.1089/thy.2016.0229
      accessed: "2026-05-22"
metrics:
  - id: hyperthyroidism_prevalence_by_sex_and_age
    kind: conditional_prevalence
    condition_code: "34486009"
    condition_system: http://snomed.info/sct
    stratify_by: sex_and_age
    tolerance: {kind: wilson, confidence: 99}
    targets:
      female:
        0-17: 0.001
        18-39: 0.010
        40-59: 0.018
        60-99: 0.025
      male:
        0-17: 0.001
        18-39: 0.004
        40-59: 0.007
        60-99: 0.010
  - id: hyperthyroidism_tsh_presence_rate
    kind: emit_presence_rate
    condition_code: "34486009"
    condition_system: http://snomed.info/sct
    tolerance: {kind: absolute, value: 0.001}
    emit_resource_type: Observation
    target: 1.0
    emit_code: "3016-3"
    emit_code_system: http://loinc.org
  - id: hyperthyroidism_methimazole_rate
    kind: emit_presence_rate
    condition_code: "34486009"
    condition_system: http://snomed.info/sct
    tolerance: {kind: wilson, confidence: 99}
    emit_resource_type: MedicationRequest
    target: 0.65
    emit_code: "6835"
    emit_code_system: http://www.nlm.nih.gov/research/umls/rxnorm

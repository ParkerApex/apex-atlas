module: urinary_tract_infection
version: 0.1.0
source:
  name: UTI epidemiology review + IDSA uncomplicated cystitis guideline
  provenance: sourced
  url: https://www.nature.com/articles/nrurol.2010.190
  note: >
    Targets mirror the module's sex- and age-stratified UTI approximation,
    reflecting strong female predominance and increased older-adult male
    rates.
  citations:
    - source: >
        Foxman B. The epidemiology of urinary tract infection. Nature
        Reviews Urology. 2010;7:653-660.
      url: https://www.nature.com/articles/nrurol.2010.190
      accessed: "2026-05-22"
    - source: IDSA uncomplicated cystitis guideline
      url: https://academic.oup.com/cid/article/52/5/e103/388285
      accessed: "2026-05-22"
metrics:
  - id: uti_prevalence_by_sex_and_age
    kind: conditional_prevalence
    condition_code: "68566005"
    condition_system: http://snomed.info/sct
    stratify_by: sex_and_age
    tolerance: {kind: wilson, confidence: 99}
    targets:
      female:
        0-17: 0.025
        18-39: 0.120
        40-59: 0.090
        60-99: 0.110
      male:
        0-17: 0.010
        18-39: 0.015
        40-59: 0.025
        60-99: 0.060
  - id: uti_nitrofurantoin_rate
    kind: emit_presence_rate
    condition_code: "68566005"
    condition_system: http://snomed.info/sct
    tolerance: {kind: wilson, confidence: 99}
    emit_resource_type: MedicationRequest
    target: 0.70
    emit_code: "313996"
    emit_code_system: http://www.nlm.nih.gov/research/umls/rxnorm

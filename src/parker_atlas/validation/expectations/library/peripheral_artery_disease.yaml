module: peripheral_artery_disease
version: 0.1.0
source:
  name: PAD epidemiology review + 2024 ACC/AHA PAD guideline
  provenance: sourced
  url: https://www.ahajournals.org/doi/10.1161/CIRCRESAHA.116.303849
  note: >
    Targets mirror the module's age/sex PAD approximation, reflecting
    sharp older-adult age gradient and male-predominant vascular burden.
  citations:
    - source: >
        Criqui MH, Aboyans V. Epidemiology of peripheral artery disease.
        Circulation Research. 2015;116(9):1509-1526.
      url: https://www.ahajournals.org/doi/10.1161/CIRCRESAHA.116.303849
      accessed: "2026-05-22"
    - source: 2024 ACC/AHA Guideline for Lower Extremity Peripheral Artery Disease
      url: https://www.ahajournals.org/doi/10.1161/CIR.0000000000001251
      accessed: "2026-05-22"
metrics:
  - id: pad_prevalence_by_sex_and_age
    kind: conditional_prevalence
    condition_code: "399957001"
    condition_system: http://snomed.info/sct
    stratify_by: sex_and_age
    tolerance: {kind: wilson, confidence: 99}
    targets:
      female:
        0-17: 0.0
        18-39: 0.002
        40-59: 0.030
        60-99: 0.120
      male:
        0-17: 0.0
        18-39: 0.003
        40-59: 0.040
        60-99: 0.150
  - id: pad_abi_presence_rate
    kind: emit_presence_rate
    condition_code: "399957001"
    condition_system: http://snomed.info/sct
    tolerance: {kind: absolute, value: 0.001}
    emit_resource_type: Observation
    target: 1.0
    emit_code: "89287-4"
    emit_code_system: http://loinc.org

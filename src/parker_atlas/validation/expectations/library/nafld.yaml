module: nafld
version: 0.1.0
source:
  name: 'Younossi ZM, Koenig AB, Abdelatif D, et al. Global epidemiology of nonalcoholic fatty liver disease
    — meta-analytic assessment of prevalence, incidence, and outcomes. Hepatology. 2016;64(1):73-84.

    '
  provenance: sourced
  url: https://aasldpubs.onlinelibrary.wiley.com/doi/10.1002/hep.28431
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check). Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. Global
    NAFLD prevalence 25.2% (95% CI 22.1-28.7%). US prevalence ~24-30%. NASH prevalence among NAFLD patients
    ~59.1%; cirrhosis in NASH ~20%; hepatocellular carcinoma in NASH cirrhosis ~6.6%.

    '
  citations:
  - source: 'Younossi ZM, Koenig AB, Abdelatif D, et al. Global epidemiology of nonalcoholic fatty liver
      disease — meta-analytic assessment of prevalence, incidence, and outcomes. Hepatology. 2016;64(1):73-84.

      '
    url: https://aasldpubs.onlinelibrary.wiley.com/doi/10.1002/hep.28431
    accessed: '2026-06-04'
metrics:
- id: nafld_nash_prevalence_by_sex_and_age
  kind: conditional_prevalence
  condition_code: '197321007'
  condition_system: http://snomed.info/sct
  stratify_by: sex_and_age
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    female:
      0-17: 0.01
      18-39: 0.18
      40-59: 0.27
      60-99: 0.3
    male:
      0-17: 0.012
      18-39: 0.23
      40-59: 0.33
      60-99: 0.32

module: alzheimers_dementia
version: 0.1.0
source:
  name: 'Alzheimer''s Association. 2024 Alzheimer''s Disease Facts and Figures. Alzheimers Dement. 2024;20(5):3708-3821.

    '
  provenance: sourced
  url: https://www.alz.org/media/Documents/alzheimers-facts-and-figures.pdf
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check). Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. 6.9 million
    Americans 65+ with Alzheimer''s in 2024. Prevalence: ~5% at 65-74, ~14% at 75-84, ~35% at 85+. Two-thirds
    are women. Total costs $360 billion in 2024. By 2050, projected 12.7 million.

    '

module: type1_diabetes
version: 0.1.0
source:
  name: 'CDC National Diabetes Statistics Report — United States, 2022.

    '
  provenance: sourced
  url: https://www.cdc.gov/diabetes/data/statistics-report/index.html
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check). Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. ~1.45
    million US adults have T1D (~0.5% of adults). Incidence peaks in childhood; prevalence is highest
    in younger adults carrying a childhood diagnosis. Roughly equal sex distribution.

    '
  citations:
  - source: 'CDC National Diabetes Statistics Report — United States, 2022.

      '
    url: https://www.cdc.gov/diabetes/data/statistics-report/index.html
    accessed: '2026-06-04'
metrics:
- id: type1_diabetes_prevalence_by_sex_and_age
  kind: conditional_prevalence
  condition_code: '46635009'
  condition_system: http://snomed.info/sct
  stratify_by: sex_and_age
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    female:
      0-17: 0.002
      18-39: 0.007
      40-59: 0.005
      60-99: 0.003
    male:
      0-17: 0.002
      18-39: 0.007
      40-59: 0.005
      60-99: 0.003

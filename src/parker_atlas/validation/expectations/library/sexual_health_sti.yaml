module: sexual_health_sti
version: 0.1.0
source:
  name: CDC sexually transmitted infections treatment guidelines
  provenance: sourced
  url: https://www.cdc.gov/std/treatment-guidelines/default.htm
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance. STI care includes risk-based screening, testing,
    and treatment.
  citations:
  - source: CDC sexually transmitted infections treatment guidelines
    url: https://www.cdc.gov/std/treatment-guidelines/default.htm
    accessed: '2026-06-04'
metrics:
- id: chlamydial_infection_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '105629000'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.01
    18-39: 0.045
    40-59: 0.012
    60-99: 0.003

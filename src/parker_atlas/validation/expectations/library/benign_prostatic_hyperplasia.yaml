module: benign_prostatic_hyperplasia
version: 0.1.0
source:
  name: American Urological Association BPH guideline
  provenance: sourced
  url: https://www.auanet.org/guidelines-and-quality/guidelines/benign-prostatic-hyperplasia-(bph)-guideline
  note: >
    Targets mirror the module's older-male BPH approximation and representative
    urology follow-up emits.
  citations:
    - source: American Urological Association BPH guideline
      url: https://www.auanet.org/guidelines-and-quality/guidelines/benign-prostatic-hyperplasia-(bph)-guideline
      accessed: "2026-05-22"
metrics:
  - id: bph_prevalence_by_sex_and_age
    kind: conditional_prevalence
    condition_code: "266569009"
    condition_system: http://snomed.info/sct
    stratify_by: sex_and_age
    tolerance: {kind: wilson, confidence: 99}
    targets:
      female:
        0-99: 0.0
      male:
        0-17: 0.0
        18-39: 0.010
        40-59: 0.180
        60-99: 0.520
  - id: bph_psa_presence_rate
    kind: emit_presence_rate
    condition_code: "266569009"
    condition_system: http://snomed.info/sct
    tolerance: {kind: wilson, confidence: 99}
    emit_resource_type: Observation
    target: 0.55
    emit_code: "2857-1"
    emit_code_system: http://loinc.org

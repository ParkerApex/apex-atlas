module: acute_bronchitis
version: 0.1.0
source:
  name: CDC outpatient antibiotic prescribing guidance
  provenance: sourced
  url: https://www.cdc.gov/antibiotic-use/hcp/clinical-care/adult-outpatient.html
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance. Acute uncomplicated bronchitis is usually
    viral and antibiotics are not routinely indicated.
  citations:
  - source: CDC outpatient antibiotic prescribing guidance
    url: https://www.cdc.gov/antibiotic-use/hcp/clinical-care/adult-outpatient.html
    accessed: '2026-06-04'
metrics:
- id: acute_bronchitis_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '10509002'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.06
    18-39: 0.05
    40-59: 0.05
    60-99: 0.045

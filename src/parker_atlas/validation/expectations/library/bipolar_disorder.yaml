module: bipolar_disorder
version: 0.1.0
source:
  name: 'Merikangas KR, Akiskal HS, Angst J, et al. Lifetime and 12-month prevalence of bipolar spectrum
    disorder in the National Comorbidity Survey Replication. Arch Gen Psychiatry. 2007;64(5):543-552.

    '
  provenance: sourced
  url: https://jamanetwork.com/journals/jamapsychiatry/fullarticle/209925
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check). Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. NCS-R:
    Bipolar I lifetime 1.0%, Bipolar II 1.1%, subthreshold 2.4% — total bipolar spectrum 4.4%. Median
    onset 25 years. Severe functional impairment in majority of Bipolar I. Lifetime comorbidity with anxiety
    disorders ~75%.

    '
  citations:
  - source: 'Merikangas KR, Akiskal HS, Angst J, et al. Lifetime and 12-month prevalence of bipolar spectrum
      disorder in the National Comorbidity Survey Replication. Arch Gen Psychiatry. 2007;64(5):543-552.

      '
    url: https://jamanetwork.com/journals/jamapsychiatry/fullarticle/209925
    accessed: '2026-06-04'
metrics:
- id: bipolar_disorder_prevalence_by_sex_and_age
  kind: conditional_prevalence
  condition_code: '13746004'
  condition_system: http://snomed.info/sct
  stratify_by: sex_and_age
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    female:
      0-17: 0.003
      18-39: 0.028
      40-59: 0.018
      60-99: 0.007
    male:
      0-17: 0.002
      18-39: 0.026
      40-59: 0.016
      60-99: 0.006

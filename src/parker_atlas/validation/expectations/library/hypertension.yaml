module: hypertension
version: 0.2.0
source:
  name: NCHS Data Brief 511 (NHANES Aug 2021 – Aug 2023)
  provenance: sourced
  url: https://www.cdc.gov/nchs/products/databriefs/db511.htm
  note: 'Age- and sex-stratified hypertension prevalence among US adults aged 18

    and older. Numbers are crude (unadjusted) prevalence percentages from

    Table 1 of NCHS Data Brief No. 511, divided by 100 to yield proportions.

    Hypertension is defined per the publication as "measured high blood

    pressure and/or currently taking antihypertensive medication."

    Published 95% CIs are preserved in the source_note column of the input

    CSV for audit but are not yet used by the Wilson tolerance checker.

    '
  citations:
  - source: 'Muntner P, Miller EC, Jaeger BC, et al. Hypertension Prevalence, Awareness, Treatment, and
      Control Among Adults Age 18 and Older: United States, August 2021–August 2023. NCHS Data Brief no.
      511.

      '
    url: https://www.cdc.gov/nchs/products/databriefs/db511.htm
    version: NCHS Data Brief No. 511
    accessed: '2026-04-23'
    table: 'Table 1: Prevalence, awareness, treatment, and control of hypertension among adults age 18
      and older, by selected characteristics: United States, August 2021–August 2023'
    note: 'Numbers extracted via webfetch on 2026-04-23. Any subsequent NCHS revision of Brief 511 should
      trigger a re-ingest.

      '
metrics:
- id: essential_hypertension_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '59621000'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99
  targets:
    18-39: 0.234
    40-59: 0.525
    60-99: 0.716
- id: essential_hypertension_prevalence_by_sex_and_age
  kind: conditional_prevalence
  condition_code: '59621000'
  condition_system: http://snomed.info/sct
  stratify_by: sex_and_age
  tolerance:
    kind: wilson
    confidence: 99
  targets:
    female:
      18-39: 0.164
      40-59: 0.49
      60-99: 0.706
    male:
      18-39: 0.3
      40-59: 0.559
      60-99: 0.727
- id: hypertension_treated_rate
  kind: emit_presence_rate
  condition_code: '59621000'
  condition_system: http://snomed.info/sct
  tolerance:
    kind: wilson
    confidence: 99
  emit_resource_type: MedicationRequest
  target: 0.6
  emit_code: '197361'
  emit_code_system: http://www.nlm.nih.gov/research/umls/rxnorm

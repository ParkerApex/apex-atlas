module: adhd
version: 0.1.0
source:
  name: CDC ADHD data and statistics
  provenance: sourced
  url: https://www.cdc.gov/adhd/data/index.html
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. ADHD is commonly
    diagnosed in childhood and may persist into adulthood.
  citations:
  - source: CDC ADHD data and statistics
    url: https://www.cdc.gov/adhd/data/index.html
    accessed: '2026-06-04'
metrics:
- id: attention_deficit_hyperactivity_disorder_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '406506008'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.09
    18-39: 0.045
    40-59: 0.025
    60-99: 0.008

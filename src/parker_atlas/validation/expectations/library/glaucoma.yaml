    JAMA Ophthalmol. 2024;142(11):1046-1053.
  provenance: sourced
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC11581589/
  note: 'Crude US prevalence of any glaucoma by age in 2022: 0.08% (18-39), 1.09% (40-64), 4.44% (65-79),

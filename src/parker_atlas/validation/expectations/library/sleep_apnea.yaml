module: sleep_apnea
version: 0.1.0
source:
  name: 'Benjafield AV, Ayas NT, Eastwood PR, et al. Estimation of the global prevalence and burden of
    obstructive sleep apnoea: a literature-based analysis. Lancet Respir Med. 2019;7(8):687-698.

    '
  provenance: sourced
  url: https://www.thelancet.com/journals/lanres/article/PIIS2213-2600(19)30198-5/fulltext
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check against the cited source). 936 million adults globally with AHI ≥5; 425 million with AHI ≥15

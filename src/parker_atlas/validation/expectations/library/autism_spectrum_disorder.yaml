module: autism_spectrum_disorder
version: 0.1.0
source:
  name: CDC Autism and Developmental Disabilities Monitoring Network
  provenance: sourced
  url: https://www.cdc.gov/autism/data-research/index.html
  note: Targets mirror the module's declared, sourced prevalence (pipeline-correctness + calibration check).
    Zero-prevalence strata omitted; Wilson 99.9% tolerance. CDC ADDM monitors autism spectrum disorder
    prevalence among children in the United States.
  citations:
  - source: CDC Autism and Developmental Disabilities Monitoring Network
    url: https://www.cdc.gov/autism/data-research/index.html
    accessed: '2026-06-04'
metrics:
- id: autism_spectrum_disorder_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '35919005'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.03
    18-39: 0.018
    40-59: 0.01
    60-99: 0.004

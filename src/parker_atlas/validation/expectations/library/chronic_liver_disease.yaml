module: chronic_liver_disease
version: 0.1.0
source:
  name: CDC chronic liver disease and cirrhosis statistics
  provenance: sourced
  url: https://www.cdc.gov/nchs/fastats/liver-disease.htm
  note: 'Targets mirror the module''s declared, sourced prevalence (pipeline-correctness + calibration
    check). Zero-prevalence strata omitted; Wilson 99.9% tolerance for robustness across seeds. Chronic
    liver disease and cirrhosis remain important causes of morbidity and mortality in the United States.

    '
  citations:
  - source: CDC chronic liver disease and cirrhosis statistics
    url: https://www.cdc.gov/nchs/fastats/liver-disease.htm
    accessed: '2026-06-04'
metrics:
- id: chronic_liver_disease_prevalence_by_age
  kind: conditional_prevalence
  condition_code: '328383001'
  condition_system: http://snomed.info/sct
  stratify_by: age_bracket
  tolerance:
    kind: wilson
    confidence: 99.9
  targets:
    0-17: 0.002
    18-39: 0.018
    40-59: 0.045
    60-99: 0.055

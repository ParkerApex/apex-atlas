name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking: the test suite must pass. This is the regression gate.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q -o addopts="" -p no:cacheprovider -n auto

  # Advisory: ruff + mypy annotate PRs but do not block yet — the codebase
  # carries pre-existing lint/type debt. Remove continue-on-error once it is
  # burned down (tracked separately).
  quality:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (advisory)
        run: ruff check --output-format=github .
      - name: Mypy (advisory)
        run: mypy src/parker_atlas
